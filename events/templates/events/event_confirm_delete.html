{% extends 'base.html' %}

{% block title %}Delete Event | Eventory{% endblock %}

{% block content %}
<section class="confirm-panel">
    <span class="eyebrow">Confirm deletion</span>
    <h1>Delete event</h1>
    <p>Are you sure you want to delete <strong>{{ event.title }}</strong>? This action will remove it from the event list.</p>
    <form method="post" class="form-actions">
        {% csrf_token %}
        <button class="button button-danger" type="submit">Yes, Delete</button>
        <a class="button button-secondary" href="{% url 'event_detail' event.id %}">Cancel</a>
    </form>
</section>
{% endblock %}
