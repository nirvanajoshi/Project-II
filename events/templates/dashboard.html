<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>
    <h1>Dashboard</h1>
    <p>Welcome back, {{ user.username }}.</p>

    <section>
        <h2>Overview</h2>
        <ul>
            <li>Total events: {{ events_count }}</li>
            <li>User email: {{ user.email|default:'Not provided' }}</li>
        </ul>
    </section>

    <section>
        <h2>Actions</h2>
        <p><a href="{% url 'home' %}">Browse events</a></p>
        <p><a href="{% url 'create_event' %}">Create event</a></p>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
    </section>
</body>
</html>
